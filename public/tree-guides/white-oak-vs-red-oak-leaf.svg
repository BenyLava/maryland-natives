<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-labelledby="title desc">
  <title id="title">Leaf lobe comparison: white oak group vs red oak group</title>
  <desc id="desc">Schematic oak leaves showing rounded lobes without bristle tips versus pointed lobes with bristle tips.</desc>
  <rect width="560" height="200" fill="#fafaf8"/>
  <text x="280" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#262626">Oak leaf tips — Maryland field cue</text>
  <g fill="none" stroke="#171717" stroke-width="2" stroke-linejoin="round" transform="translate(40,40)">
    <path d="M100 120 L100 72 C100 48 88 36 72 40 C58 32 42 44 40 62 C32 52 14 58 12 78 C8 68 -4 78 8 92 C4 108 20 118 40 114 C48 128 72 132 100 120 Z"/>
  </g>
  <text x="130" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#404040">White oak group: rounded lobe ends</text>
  <g fill="none" stroke="#171717" stroke-width="2" stroke-linejoin="round" transform="translate(300,36)">
    <path d="M100 124 L104 88 L118 102 L128 64 L142 94 L158 58 L172 88 L188 52 L202 82 L218 56 L232 124 Z"/>
    <circle cx="128" cy="64" r="3" fill="#171717"/>
    <circle cx="158" cy="58" r="3" fill="#171717"/>
    <circle cx="188" cy="52" r="3" fill="#171717"/>
    <circle cx="218" cy="56" r="3" fill="#171717"/>
  </g>
  <text x="410" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#404040">Red oak group: bristle-tipped ends</text>
</svg>
